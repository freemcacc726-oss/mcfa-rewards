<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MCFA Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🎁 MCFA Rewards</div>
</header>

<section class="hero">

    <div class="login-card">

        <h2>Create Account</h2>

        <p class="small-text">
            Create your account to start claiming exclusive rewards.
        </p>

        <form action="dashboard.html">

            <input type="text" placeholder="Username" required>

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Create Account</button>

        </form>

        <div class="divider">
            <span>Already have an account?</span>
        </div>

        <a href="index.html" class="register-btn">
            Login
        </a>

        <p class="small-text">
            📧 After registering, a verification email will be sent to your email address.
        </p>

    </div>

</section>

<footer>
    © 2026 MCFA Rewards • All Rights Reserved
</footer>

<script src="script.js"></script>

</body>
</html>
