<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MCFA Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🛡️ MCFA Admin</div>

    <a href="index.html" class="admin-btn">Home</a>
</header>

<section class="hero">

    <div class="login-card">

        <h2>Administrator Login</h2>

        <p class="small-text">
            Authorized administrators only.
        </p>

        <form action="admin-dashboard.html">

            <input type="email" placeholder="Admin Email" required>

            <input type="password" placeholder="Admin Password" required>

            <button type="submit">Login</button>

        </form>

        <p class="small-text">
            Unauthorized access is prohibited.
        </p>

    </div>

</section>

<footer>
    © 2026 MCFA Rewards • Admin Panel
</footer>

<script src="script.js"></script>

</body>
</html>
