<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Reward | MCFA Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🎁 MCFA Rewards</div>

    <a href="dashboard.html" class="admin-btn">← Back</a>
</header>

<section class="hero">

    <div class="login-card">

        <h2>Claim Your Reward</h2>

        <p class="small-text">
            Select your reward and enter your reward code.
        </p>

        <form action="success.html">

            <select required class="select-box">
                <option value="">Select Reward</option>
                <option>MCFA Permanent</option>
                <option>Minecraft Redeem Code</option>
                <option>Roblox $50 Gift Card</option>
                <option>Roblox $100 Gift Card</option>
                <option>Nitro Basic Yearly</option>
                <option>Nitro Boost Yearly</option>
            </select>

            <input
                type="text"
                placeholder="Enter Reward Code"
                required
            >

            <button type="submit">Claim Reward</button>

        </form>

        <p class="small-text">
            ⚠️ Reward codes can only be used once.
        </p>

    </div>

</section>

<footer>
    © 2026 MCFA Rewards • All Rights Reserved
</footer>

<script src="script.js"></script>

</body>
</html>
