<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claim Reward | MCFA Rewards</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
🎁 MCFA Rewards
</div>


<a href="dashboard.html" class="admin-btn">
← Back
</a>


</header>




<section class="hero">


<div class="login-card">


<h2>
Claim Your Reward 🎁
</h2>


<p class="small-text">
Enter your reward code to submit your claim.
</p>



<form id="claimForm">


<select 
id="reward"
class="select-box"
required>


<option value="">
Select Reward
</option>

<option value="MCFA Permanent">
MCFA Permanent
</option>

<option value="Minecraft Redeem Code">
Minecraft Redeem Code
</option>

<option value="Roblox $50 Gift Card">
Roblox $50 Gift Card
</option>

<option value="Roblox $100 Gift Card">
Roblox $100 Gift Card
</option>

<option value="Nitro Basic Yearly">
Nitro Basic Yearly
</option>

<option value="Nitro Boost Yearly">
Nitro Boost Yearly
</option>


</select>





<input

id="code"

type="text"

placeholder="Enter Reward Code"

required

>




<button type="submit">

Claim Reward

</button>



</form>




<p id="message" class="small-text"></p>



<p class="small-text">

⚠️ Reward codes can only be used once.

</p>


</div>



</section>




<footer>

© 2026 MCFA Rewards • All Rights Reserved

</footer>





<script>


// Auto select reward from dashboard

let selectedReward =
localStorage.getItem("selectedReward");


if(selectedReward){

document.getElementById("reward").value =
selectedReward;

}




document.getElementById("claimForm")
.addEventListener("submit", function(e){


e.preventDefault();



let reward =
document.getElementById("reward").value;


let code =
document.getElementById("code").value.trim();



let message =
document.getElementById("message");



if(!reward){

message.innerHTML =
"❌ Please select a reward.";

return;

}



if(code.length < 3){

message.innerHTML =
"❌ Enter a valid reward code.";

return;

}




// Later connects to server.js API

localStorage.setItem(
"claimedReward",
reward
);



localStorage.removeItem(
"selectedReward"
);



window.location.href =
"success.html";



});



</script>



</body>
</html>
